<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosco — Cohesión</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'JetBrains Mono', monospace;
    }
    video {
      max-height: 100vh;
      max-width: 100%;
      width: auto;
      height: auto;
    }

    .controls {
      position: fixed;
      bottom: 28px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-visit {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0 20px;
      background: rgba(12, 12, 14, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #e3e1d9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .btn-visit:active {
      background: rgba(74, 111, 165, 0.3);
      border-color: rgba(74, 111, 165, 0.5);
    }
  </style>
</head>
<body>
  <video id="vid" autoplay loop muted playsinline>
    <source src="https://cdn.shopify.com/videos/c/o/v/31c393c0f8cd4fbf8c93a8f16e9d67fa.mov" type="video/mp4">
  </video>

  <div class="controls">
    <a href="https://rosco.studio/" target="_blank" class="btn-visit">Rosco.studio</a>
  </div>
</body>
</html>
