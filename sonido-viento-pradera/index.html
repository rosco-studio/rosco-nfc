<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosco — Sonido:Viento en Pradera</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    video {
      max-height: 100vh;
      max-width: 100%;
      width: auto;
      height: auto;
    }
    #muteBtn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 22px;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <video id="vid" autoplay loop muted playsinline>
    <source src="https://cdn.shopify.com/videos/c/o/v/a0b3f807d7f84311b826bfb9312ad880.mov" type="video/mp4">
  </video>
  <button id="muteBtn">🔇</button>
  <script>
    const btn = document.getElementById('muteBtn');
    const vid = document.getElementById('vid');
    btn.addEventListener('click', () => {
      vid.muted = !vid.muted;
      btn.textContent = vid.muted ? '🔇' : '🔊';
    });
  </script>
</body>
</html>
